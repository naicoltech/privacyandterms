<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Naicol Tech</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
            line-height: 1.7;
            color: #333;
            background: linear-gradient(135deg, #e0f2fe 0%, #f0f9ff 50%, #e8f0fe 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            text-align: center;
            background: #fff;
            padding: 50px 40px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        h1 {
            color: #1a73e8;
            font-size: 2em;
            margin-bottom: 8px;
        }
        .tagline {
            color: #666;
            font-size: 1.1em;
            margin-bottom: 32px;
        }
        .links {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .links a {
            display: block;
            padding: 14px 24px;
            background: #e8f0fe;
            color: #1a73e8;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 500;
            transition: background 0.2s;
        }
        .links a:hover {
            background: #d2e3fc;
        }
        .developer {
            margin-top: 32px;
            color: #999;
            font-size: 0.85em;
        }
        .developer a {
            color: #999;
            text-decoration: none;
        }
        .developer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Naicol Tech</h1>
        <p class="tagline">Mobile Apps</p>
        <div class="links">
            <a href="privacy-policy.html">Privacy Policy</a>
            <a href="terms.html">Terms &amp; Conditions</a>
        </div>
        <p class="developer">
            <a href="mailto:naicoltech@gmail.com">naicoltech@gmail.com</a>
        </p>
    </div>
</body>
</html>
